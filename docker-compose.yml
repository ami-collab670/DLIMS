# Full stack: PostgreSQL + Django API + Strapi CMS + Vite dev server
# From this directory (v1): docker compose up --build
#
# Open: http://localhost:5173  (API proxied to backend; CMS proxied via /cms-api)
# API:  http://localhost:8000
# CMS:  http://localhost:1337/admin

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lsims
      POSTGRES_PASSWORD: lsims_dev
      POSTGRES_DB: lsims
    volumes:
      - lsims_pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lsims -d lsims"]
      interval: 3s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./LSIMS-Backend/LSIMS-main
      dockerfile: Dockerfile
    # Create dev users (stack must be up):
    #   .\scripts\create-user.ps1 --email admin@ministry.gov --password AdminPass123! --role admin
    #   docker compose exec backend python manage.py seed_roles
    #   docker compose exec backend python manage.py create_user --email analyst@ministry.gov --password AnalystPass123! --role analyst
    volumes:
      - ./LSIMS-Backend/LSIMS-main:/app
    ports:
      - "8000:8000"
    environment:
      DJANGO_DEBUG: "True"
      DATABASE_URL: postgres://lsims:lsims_dev@db:5432/lsims
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./LSIMS-Frontend
      dockerfile: Dockerfile.dev
    working_dir: /app
    volumes:
      - ./LSIMS-Frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      # Vite dev server proxies /api → Django (see vite.config.ts)
      VITE_PROXY_API: http://backend:8000
      VITE_CMS_PROXY: http://cms:1337
      CHOKIDAR_USEPOLLING: 'true'
      WATCHPACK_POLLING: 'true'
      NODE_OPTIONS: '--max-old-space-size=4096'
    depends_on:
      backend:
        condition: service_started
      cms:
        condition: service_healthy

  cms:
    build: ./cms
    tty: true
    stdin_open: true
    restart: unless-stopped
    ports:
      - "1337:1337"
    environment:
      DATABASE_CLIENT: postgres
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: cms
      DATABASE_USERNAME: lsims
      DATABASE_PASSWORD: lsims_dev
      APP_KEYS: devKey1,devKey2
      API_TOKEN_SALT: devApiTokenSalt
      ADMIN_JWT_SECRET: devAdminJwtSecret
      JWT_SECRET: devJwtSecret
      TRANSFER_TOKEN_SALT: devTransferSalt
      ENCRYPTION_KEY: devEncryptionKey1234567890123456
      HOST: 0.0.0.0
      PORT: 1337
      NODE_OPTIONS: '--max-old-space-size=4096'
    volumes:
      - ./cms:/opt/app
      # Keep image node_modules; do not use a named volume (corrupted installs cannot be removed in-container).
      - /opt/app/node_modules
      - cms_uploads:/opt/app/public/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:1337/api/home-page').then(async (r)=>{if(!r.ok)process.exit(1);const b=await r.json();process.exit(b?.data?0:1)}).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 180s

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: lsims-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"                  # Access pgAdmin at http://localhost:5050
    environment:
      PGADMIN_DEFAULT_EMAIL: "legekiya@gmail.com"
      PGADMIN_DEFAULT_PASSWORD: "admin123"
      PGADMIN_CONFIG_SERVER_MODE: 'False'          # Optional: simpler for local dev
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin   # Persist pgAdmin settings

volumes:
  lsims_pgdata:
  cms_uploads:
  pgadmin_data: