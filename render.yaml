# render.yaml — Render.com Blueprint for LSIMS Staging
# Deploy via: https://render.com/deploy → connect your GitHub repo
#
# Database note:
# LSIMS uses an externally managed PostgreSQL database on Supabase.
# Set DATABASE_URL manually in the Render dashboard; do not bind it to a
# Render-managed database resource.

services:
  - type: web
    name: lsims-api-staging
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn lsims_project.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.13.2"
