name: Mirror to Shared Repository

on:
  push:
    branches:
      - main

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for 'kiya' in latest commit message
        id: check_msg
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          if echo "$COMMIT_MSG" | grep -qi 'kiya'; then
            echo "match=true" >> "$GITHUB_OUTPUT"
          else
            echo "match=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push to shared repository
        if: steps.check_msg.outputs.match == 'true'
        uses: cpina/github-action-push-to-another-repository@master
        env:
          API_TOKEN_GITHUB: ${{ secrets.SHARED_REPO_TOKEN }}
        with:
          source-directory: .
          destination-github-username: ami-collab670
          destination-repository-name: DLIMS
          target-branch: master
          user-email: 249707871+tempotest26-ctrl@users.noreply.github.com
          user-name: tempotest26-ctrl
          commit-message: Mirror from ORIGIN_COMMIT
          create-target-branch-if-needed: true
